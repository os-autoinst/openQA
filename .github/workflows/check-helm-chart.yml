---
name: check-helm-chart
# yamllint disable-line rule:truthy
on: [push, pull_request]
jobs:
  lint-chart:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.8.1

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.13

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2

      - name: Run chart-testing
        run: make test-helm-lint
  install-chart:
    runs-on: ubuntu-latest
    needs: lint-chart
    env:
      REGISTRY_PATH: registry.opensuse.org/devel/openqa/containers16.0
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.8.1

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.13

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2

      - name: Create kind cluster
        uses: helm/kind-action@v1

      - name: Download images
        run: |
          RETRY=3 SLEEP=15 tools/retry docker pull $REGISTRY_PATH/openqa_webui:latest
          RETRY=3 SLEEP=15 tools/retry docker pull $REGISTRY_PATH/openqa_worker:latest

      - name: Load images into the Cluster
        run: |
          kind load docker-image --name chart-testing \
          $REGISTRY_PATH/openqa_webui:latest \
          $REGISTRY_PATH/openqa_worker:latest

      - name: Run chart-testing
        run: make test-helm-install

---
name: check-helm-chart
# yamllint disable-line rule:truthy
on: [push, pull_request]
jobs:
  lint-chart:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310  # v5.0.1
        with:
          version: v3.8.1

      - name: Install Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: 3.13

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f  # v2

      - name: Run chart-testing
        run: make test-helm-lint
  install-chart:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: lint-chart
    env:
      REGISTRY_PATH: registry.opensuse.org/devel/openqa/containers16.0
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310  # v5.0.1
        with:
          version: v3.8.1

      - name: Install Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: 3.13

      - name: Install retry
        run: |
          curl -sSfL https://raw.githubusercontent.com/okurz/retry/main/retry -o /usr/local/bin/retry
          chmod +x /usr/local/bin/retry

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f  # v2

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc  # v1

      - name: Download images
        run: |
          for i in webui worker; do
            retry -r 7 -s 15 -e docker pull $REGISTRY_PATH/openqa_$i:latest
          done

      - name: Load images into the Cluster
        run: |
          kind load docker-image --name chart-testing \
          $REGISTRY_PATH/openqa_webui:latest \
          $REGISTRY_PATH/openqa_worker:latest

      - name: Run chart-testing
        run: make test-helm-install

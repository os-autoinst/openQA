merge_queue:
  status_comments: none
  queue_controls_comment: false

pull_request_rules:
  - name: automatic merge
    conditions:
      - "#approved-reviews-by>=2"
      - "#changes-requested-reviews-by=0"
      # https://doc.mergify.io/examples.html#require-all-requested-reviews-to-be-approved
      - "#review-requested=0"
      - -label~=^acceptance-tests-needed|not-ready
      - base=master
      - "#check-failure=0"
      - "#check-pending=0"
      - linear-history
    actions:
      merge:
        method: merge
  - name: automatic merge on special label
    conditions:
      - -label~=^acceptance-tests-needed|not-ready
      - "label=merge-fast"
      - base=master
    actions:
      merge:
        method: merge
  - name: automatic merge for dependabot updates
    conditions:
      - base=master
      - author=dependabot[bot]
      - -label~=^acceptance-tests-needed|not-ready
      - "#check-failure=0"
      - "#check-pending=0"
      - linear-history
    actions:
      merge:
        method: squash

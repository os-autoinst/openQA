---
name: 'Unit Tests'

on: [push, pull_request]

jobs:
  test:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    container:
      image: registry.opensuse.org/devel/openqa/containers/os-autoinst_dev
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - run: make test-t
